name: Build Salud Urs APK

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master
      - dev
    paths:
      - 'public/blut/**'
      - '.github/workflows/build-blutdruck-apk.yml'

jobs:
  build-blut-apk:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK packages
        run: |
          yes | sdkmanager --licenses >/dev/null
          sdkmanager "platforms;android-35" "build-tools;35.0.0" "platform-tools"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.7'

      - name: Build APK
        working-directory: public/blut/android
        run: gradle :app:assembleDebug --no-daemon --stacktrace

      - name: Prepare APK download file
        run: |
          mkdir -p apk-output
          cp public/blut/android/app/build/outputs/apk/debug/app-debug.apk apk-output/blutdruck-app.apk
          ls -lh apk-output/blutdruck-app.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: blutdruck-app
          path: apk-output/blutdruck-app.apk
