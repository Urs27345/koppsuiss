name: Blutdruck APK bauen

on:
  workflow_dispatch:
  push:
    branches: [ main, master ]
    paths:
      - 'public/blut/**'
      - '.github/workflows/build-blutdruck-apk.yml'
      - '!public/blut/blutdruck-app.apk'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Repository laden
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Java 17 einrichten
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Android SDK einrichten
        uses: android-actions/setup-android@v3

      - name: Gradle einrichten
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.9'

      - name: APK bauen
        working-directory: public/blut
        run: gradle assembleDebug --no-daemon

      - name: APK nach public/blut kopieren
        run: cp public/blut/app/build/outputs/apk/debug/app-debug.apk public/blut/blutdruck-app.apk

      - name: APK als Download speichern
        uses: actions/upload-artifact@v4
        with:
          name: blutdruck-app-apk
          path: public/blut/blutdruck-app.apk

      - name: APK ins Repository zurückschreiben
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add public/blut/blutdruck-app.apk
          git commit -m "Build Blutdruck APK" || echo "Keine neue APK Änderung"
          git push
