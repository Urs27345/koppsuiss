name: Build Salud Urs Blut APK

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master
      - dev
    paths:
      - 'public/blut/**'
      - '.github/workflows/build-blutdruck-apk.yml'

permissions:
  contents: write

jobs:
  build-blut-apk:
    if: github.event_name == 'workflow_dispatch' || !contains(github.event.head_commit.message, '[skip apk build]')
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK packages
        run: |
          yes | sdkmanager --licenses >/dev/null
          sdkmanager "platforms;android-35" "build-tools;35.0.0" "platform-tools"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.7'

      - name: Build APK
        working-directory: public/blut/android
        run: gradle :app:assembleDebug --no-daemon --stacktrace

      - name: Copy APK to Blut download folder
        run: |
          mkdir -p public/blut
          cp public/blut/android/app/build/outputs/apk/debug/app-debug.apk public/blut/blutdruck-app.apk
          ls -lh public/blut/blutdruck-app.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: blutdruck-app
          path: public/blut/blutdruck-app.apk

      - name: Commit APK to repository
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/blut/blutdruck-app.apk
          git diff --cached --quiet && echo "No APK changes to commit" || git commit -m "build Salud Urs Blut APK [skip apk build]"
          git push
