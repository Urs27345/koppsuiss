<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#0f766e" />
  <meta name="robots" content="noindex, nofollow" />
  <title>Salut Urs</title>
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="apple-touch-icon" href="icons/icon-192.png" />
  <style>
    :root{--brand:#0f766e;--brand2:#155e75;--bg:#f4f7f6;--text:#0f172a;--muted:#64748b;}
    *{box-sizing:border-box}
    body{margin:0;min-height:100vh;display:grid;place-items:center;background:linear-gradient(135deg,#eef7f6,#ffffff);font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;color:var(--text);padding:22px}
    .box{width:min(480px,100%);background:white;border-radius:24px;padding:28px;border:1px solid #dbe7e5;box-shadow:0 16px 44px rgba(15,23,42,.12);text-align:center}
    .logo{width:74px;height:74px;border-radius:22px;margin:0 auto 14px;background:linear-gradient(135deg,var(--brand),var(--brand2));display:grid;place-items:center;color:white;font-size:34px;font-weight:900}
    h1{font-size:34px;margin:0 0 10px;letter-spacing:-.02em}
    .install{width:100%;font-size:19px;border:0;border-radius:16px;padding:16px 18px;background:var(--brand);color:#fff;font-weight:900;cursor:pointer;margin-top:12px}
    .install:active{transform:translateY(1px)}
    .open{display:block;margin-top:14px;color:var(--brand);font-weight:800;text-decoration:none}
    .hint{display:none;color:var(--muted);font-size:14px;line-height:1.35;margin-top:14px;text-align:left;background:#f8fafc;border:1px solid #e2e8f0;border-radius:14px;padding:12px}
    .hint.show{display:block}
  </style>
</head>
<body>
  <main class="box">
    <div class="logo">SU</div>
    <h1>Salut Urs</h1>
    <button id="installBtn" class="install">App installieren</button>
    <a id="openApp" class="open" href="app.html">App öffnen</a>
    <div id="hint" class="hint">
      Falls kein Installationsfenster erscheint: Menü des Browsers öffnen und <b>„App installieren“</b> oder <b>„Zum Startbildschirm hinzufügen“</b> wählen. Am besten mit Google Chrome auf Android öffnen.
    </div>
  </main>
  <script>
    let deferredPrompt = null;
    const installBtn = document.getElementById('installBtn');
    const hint = document.getElementById('hint');
    if (window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone) {
      location.replace('app.html');
    }
    window.addEventListener('beforeinstallprompt', (event) => {
      event.preventDefault();
      deferredPrompt = event;
      installBtn.textContent = 'App installieren';
    });
    installBtn.addEventListener('click', async () => {
      if (deferredPrompt) {
        deferredPrompt.prompt();
        await deferredPrompt.userChoice;
        deferredPrompt = null;
      } else {
        hint.classList.add('show');
      }
    });
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js').catch(() => {});
    }
  </script>
</body>
</html>
