name: Build Salut Urs Android APK

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths-ignore:
      - "public/blut/**"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Repository laden
        uses: actions/checkout@v4

      - name: Java installieren
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Android SDK vorbereiten
        uses: android-actions/setup-android@v3

      - name: Gradle vorbereiten
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.10.2"

      - name: APK bauen
        run: gradle :app:assembleDebug --no-daemon

      - name: APK nach public/blut kopieren
        run: |
          mkdir -p public/blut
          cp app/build/outputs/apk/debug/app-debug.apk public/blut/salut-urs.apk
          ls -lh public/blut/salut-urs.apk

      - name: APK als GitHub-Artefakt speichern
        uses: actions/upload-artifact@v4
        with:
          name: salut-urs-apk
          path: public/blut/salut-urs.apk

      - name: APK ins Repository schreiben
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/blut/index.html public/blut/salut-urs.apk
          if git diff --cached --quiet; then
            echo "Keine Änderungen."
          else
            git commit -m "Build Salut Urs APK"
            git push
          fi
