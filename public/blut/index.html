<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Salut Urs App</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: Arial, Helvetica, sans-serif;
      background: #f3f6fb;
      color: #07152f;
      padding: 24px;
      box-sizing: border-box;
    }
    .card {
      width: 100%;
      max-width: 560px;
      background: #fff;
      border-radius: 18px;
      box-shadow: 0 18px 45px rgba(20, 30, 55, 0.12);
      padding: 32px 24px;
      text-align: center;
    }
    h1 {
      margin: 0 0 14px;
      font-size: 32px;
    }
    p {
      margin: 10px 0;
      font-size: 18px;
      line-height: 1.4;
    }
    .ok {
      display: inline-block;
      margin: 18px 0 8px;
      padding: 9px 16px;
      border-radius: 999px;
      background: #e8f6ec;
      color: #145c2e;
      font-size: 16px;
    }
    .button {
      display: inline-block;
      margin-top: 24px;
      padding: 16px 24px;
      border-radius: 12px;
      background: #0b5fff;
      color: #fff;
      text-decoration: none;
      font-size: 20px;
      font-weight: 700;
      box-shadow: 0 8px 22px rgba(11, 95, 255, 0.28);
    }
    .hint {
      margin-top: 18px;
      font-size: 14px;
      color: #5b6575;
    }
  </style>
</head>
<body>
  <main class="card">
    <h1>Salut Urs</h1>
    <p>Kleine Android-Test-App.</p>
    <p>Zum Prüfen, ob Download und Installation funktionieren.</p>
    <div class="ok">Installations-Test</div>
    <br>
    <a class="button" href="salut-urs-kleine-app.apk" download>App herunterladen</a>
    <p class="hint">Android: APK nach dem Download öffnen und Installation erlauben.</p>
  </main>
</body>
</html>
