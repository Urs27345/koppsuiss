<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Salut Urs</title>
  <style>
    :root {
      font-family: Arial, Helvetica, sans-serif;
      color: #07152f;
      background: #f3f6fb;
    }
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      box-sizing: border-box;
    }
    .card {
      width: 100%;
      max-width: 560px;
      background: white;
      border-radius: 18px;
      box-shadow: 0 18px 45px rgba(20, 30, 55, 0.12);
      padding: 32px 24px;
      text-align: center;
    }
    h1 {
      margin: 0 0 14px;
      font-size: 32px;
    }
    p {
      margin: 10px 0;
      font-size: 18px;
      line-height: 1.4;
    }
    .status {
      display: inline-block;
      margin: 18px 0 10px;
      padding: 9px 16px;
      border-radius: 999px;
      background: #e8f6ec;
      color: #145c2e;
      font-size: 16px;
    }
    .button {
      display: inline-block;
      margin-top: 24px;
      padding: 16px 24px;
      border-radius: 12px;
      background: #0b5fff;
      color: white;
      text-decoration: none;
      font-size: 19px;
      font-weight: bold;
      box-shadow: 0 8px 22px rgba(11, 95, 255, 0.28);
    }
    .button:active {
      transform: translateY(1px);
    }
    .hint {
      margin-top: 18px;
      font-size: 14px;
      color: #5b6575;
    }
  </style>
</head>
<body>
  <main class="card">
    <h1>Salut Urs</h1>
    <p>Browser-Test funktioniert.</p>
    <p>Bereit für Blutdruck, Medikamente und Verlauf.</p>
    <div class="status">Minimalversion OK</div>

    <br>
    <a class="button" href="salut-urs-minimal.apk" download>
      App herunterladen
    </a>

    <p class="hint">
      Android: Nach dem Download die APK öffnen und Installation erlauben.
    </p>
  </main>
</body>
</html>
