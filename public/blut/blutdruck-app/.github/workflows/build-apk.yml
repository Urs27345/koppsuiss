name: Android APK erstellen

on:
  workflow_dispatch:
  push:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Repository laden
        uses: actions/checkout@v4

      - name: Java einrichten
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Android SDK einrichten
        uses: android-actions/setup-android@v3

      - name: Android SDK-Pakete installieren
        run: |
          sdkmanager "platforms;android-35" "build-tools;35.0.0"

      - name: Gradle einrichten
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.10.2'

      - name: APK bauen
        run: gradle assembleDebug

      - name: APK als Download speichern
        uses: actions/upload-artifact@v4
        with:
          name: blutdruck-app-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk
